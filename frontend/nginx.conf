# nginx config for the frontend container.
# Serves the built SPA from /usr/share/nginx/html and reverse-proxies the
# backend's API + wallpaper routes to the `backend` service on port 8000.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy API + wallpaper routes to the backend. Trailing slash on the
    # proxy_pass URL means the path is preserved verbatim.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /wallpapers/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: any unknown route serves index.html (React Router handles
    # client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for built assets (content-hashed filenames).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}